{% set name = "thewalrus" %}
{% set version = "0.22.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/XanaduAI/thewalrus/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 9a5d7a03c3ea8fe53e897a1033ca56805de4d81c3a416c6f871cb1aeeeb92aba

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  build:
  host:
    - numpy >=1.19.2
    - pip
    - python {{ python_min }}
  run:
    - dask-core
    - dask
    - numba >=0.61.2,<1
    - {{ pin_compatible('numpy') }}
    - python >={{ python_min }}
    - scipy >=1.15.3,<2
    - sympy >=1.14.0,<2

test:
  imports:
    - thewalrus
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/XanaduAI/thewalrus
  summary: Open source library for hafnian calculation
  license: Apache-2.0
  license_file: LICENSE
  dev_url: https://the-walrus.readthedocs.io/

extra:
  recipe-maintainers:
    - BastianZim
